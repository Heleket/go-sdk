name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  qa:
    name: Go ${{ matrix.go }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.22", "stable"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: make vet

      - name: Format check
        run: make fmt-check

      - name: Test (race)
        run: make race

      - name: Static analysis
        uses: dominikh/staticcheck-action@v1
        with:
          version: latest
          install-go: false
